                conditions: { civ: 'otd', age: 2 },
                actions: [{ type: 'hideImage', imageName: '僧侣.png' },]
            },
            {
                conditions: { civ: 'tug', age: 1 },
                actions: [{ type: 'hideImage', imageName: '僧侣.png' },]
            },
            {
                conditions: { civ: 'tug', age: 2 },
                actions: [{ type: 'hideImage', imageName: '僧侣.png' },]
            },
            {
                conditions: { civ: 'byz', age: 2 },
                actions: [{ type: 'hideImage', imageName: '武士.png' },]
            },
        ];
        // =========================================================
        // 家族规则
        // =========================================================
        const imageNameAliases = {};
        const specialUnitRules = {
            '国王.png': {
                noAgeSuffix: true,
                minAge: 2
            },
            '猛安谋克守军.png': {
                noAgeSuffix: true,
                minAge: 3
            },
            '骑马掷弹兵.png': {
                noAgeSuffix: true,
                minAge: 4
            },
            '忍者.png': {
                noAgeSuffix: true,
                minAge: 2
            },
            '刀剑旗本武士.png': {
                noAgeSuffix: true,
                minAge: 2
            },
            '弓箭旗本武士.png': {
                noAgeSuffix: true,
                minAge: 2
            },
            '骑马旗本武士.png': {
                noAgeSuffix: true,
                minAge: 2
            },
            '一向一揆僧侣.png': {
                noAgeSuffix: true,
                minAge: 3
            },
            '兰开斯特领主.png': {
                noAgeSuffix: true,
                minAge: 2
            },
            '贝都因剑士.png': {
                noAgeSuffix: true,
                minAge: 2
            },
            '贝都因掷矛手.png': {
                noAgeSuffix: true,
                minAge: 2
            },
            '埃米尔战士.png': {
                noAgeSuffix: true,
                minAge: 2
            },
            '肉盾.png': {
                noAgeSuffix: true,
                minAge: 1
            },
            '民兵长戟兵.png': {
                noAgeSuffix: true,
                minAge: 2
            },
            '民兵火枪兵.png': {
                noAgeSuffix: true,
                minAge: 3
            },
            '奥斯曼军乐队.png': {
                noAgeSuffix: true,
                minAge: 2
            },
        };
        // =========================================================
        // 自动生成表格
        // =========================================================
        function generateTable() {
            $table.empty();
            const civData =
                civTables.find(
                    c => c.civname === currentCiv
                );
            if (!civData) return;
            const units =
                civData.civunits;
            const columnsPerRow = 5;
            for (
                let i = 0;
                i < units.length;
                i += columnsPerRow
            ) {
                const $tr =
                    $('<tr></tr>');
                const rowUnits =
                    units.slice(
                        i,
                        i + columnsPerRow
                    );
                rowUnits.forEach(unitName => {
                    const $td =
                        $('<td></td>');
                    // 空格占位
                    if (
                        !unitName ||
                        unitName.trim() === ''
                    ) {
                        $td.html('&nbsp;');
                    } else {
                        const imgPath =
                            `https://data.seicing.com/seicingdepot/3fatcatpool/aoe4/unit/${currentCivLink}/${unitName}.png`;
                        const $img =
                            $('<img>');
                        $img.attr(
                            'data-aoe4unit',
                            imgPath
                        );
                        $img.data(
                            'original-src',
                            imgPath
                        );
                        $td.append($img);
                    }
                    $tr.append($td);
                });
                // 补满5列
                while (
                    $tr.children().length < 5
                ) {
                    $tr.append(
                        $('<td>&nbsp;</td>')
                    );
                }
                $table.append($tr);
            }
        }
        // =========================================================
        // 文明按钮
        // =========================================================
        $('.civ-selector a').on('click', function (e) {
            e.preventDefault();
            $('.civactbtn')
                .removeClass('active');
            $(this)
                .addClass('active');
            const id =
                $(this).attr('id');
            const civId =
                id.replace(
                    'Button0',
                    ''
                );
            currentCiv =
                civId;
            const civData =
                civTables.find(
                    c => c.civname === civId
                );
            currentCivLink =
                civData
                    ? civData.civlinkname
                    : civId;
            generateTable();
            updateImageSources(currentAge);
        });
        // =========================================================
        // 时代按钮
        // =========================================================
        $(document).on(
            'click',
            '.age-button',
            function () {
                const $btn =
                    $(this);
                if (
                    $btn.hasClass(
                        'active'
                    )
                ) return;
                $('.age-button')
                    .removeClass(
                        'active'
                    );
                $btn.addClass(
                    'active'
                );
                currentAge =
                    parseInt(
                        $btn.data('age')
                    );
                updateImageSources(
                    currentAge
                );
            }
        );
        // =========================================================
        // 应用隐藏规则
        // =========================================================
        function applyHidingRules(age) {
            $table.find('td img')
                .css(
                    'visibility',
                    'visible'
                );
            // 当前文明对应的 icon 文件名
            const currentCivIcon =
                'CivIcon-' +
                civIconMap[currentCiv] +
                '.png';
            hidingRules.forEach(rule => {
                let conditionsMet = true;
                // =========================
                // age 判断
                // =========================
                if (
                    rule.conditions.age &&
                    rule.conditions.age != age
                ) {
                    conditionsMet = false;
                }
                // =========================
                // civ 判断（旧版兼容）
                // =========================
                if (
                    rule.conditions.civ &&
                    rule.conditions.civ != currentCiv
                ) {
                    conditionsMet = false;
                }
                // =========================
                // civIcon 判断（新版）
                // =========================
                if (
                    rule.conditions.civIcon &&
                    rule.conditions.civIcon != currentCivIcon
                ) {
                    conditionsMet = false;
                }
                if (!conditionsMet)
                    return;
                // =========================
                // 执行动作
                // =========================
                rule.actions.forEach(action => {
                    // 隐藏指定列之后的图片
                    if (
                        action.type ===
                        'hideImagesInColumns'
                    ) {
                        $table.find(
                            'td:nth-child(n+' +
                            action.from +
                            ') img'
                        ).css(
                            'visibility',
                            'hidden'
                        );
                    }
                    // 隐藏指定图片
                    if (
                        action.type ===
                        'hideImage'
                    ) {
                        $table.find('td img')
                            .each(function () {
                                const $img =
                                    $(this);
                                const currentSrc =
                                    $img.attr('src') || '';
                                if (
                                    currentSrc.includes(
                                        action.imageName.replace('.png', '')
                                    )
                                ) {
                                    $img.css(
                                        'visibility',
                                        'hidden'
                                    );
                                }
                            });
                    }
                });
            });
        }
        // =========================================================
        // 更新图片
        // =========================================================
        function updateImageSources(age) {
            const imageLoadPromises = [];
            const $imagesToLoad =
                $table.find('img');
            $imagesToLoad.each(function () {
                const $img =
                    $(this);
                const dfd =
                    $.Deferred();
                imageLoadPromises.push(
                    dfd.promise()
                );
                const originalSrc =
                    $img.data(
                        'original-src'
                    );
                if (!originalSrc) {
                    dfd.resolve();
                    return;
                }
                const unitName =
                    originalSrc
                        .split('/')
                        .pop();
                let finalFileName =
                    unitName;
                // 家族规则
                const familyName =
                    imageNameAliases[
                    unitName
                    ];
                if (familyName) {
                    const familyRule =
                        imageFamilyRules[
                        familyName
                        ];
                    if (
                        familyRule &&
                        familyRule[age]
                    ) {
                        finalFileName =
                            familyRule[age];
                    }
                } else {
                    const extension =
                        unitName.substring(
                            unitName.lastIndexOf('.')
                        );
                    const filename =
                        unitName.substring(
                            0,
                            unitName.lastIndexOf('.')
                        );
                    // =========================
                    // 特殊单位规则
                    // =========================
                    const specialRule =
                        specialUnitRules[unitName];
                    if (specialRule) {
                        // 最小时代限制
                        if (
                            specialRule.minAge &&
                            age < specialRule.minAge
                        ) {
                            $img.css(
                                'visibility',
                                'hidden'
                            );
                            dfd.resolve();
                            return;
                        }
                        // 不带时代编号
                        if (
                            specialRule.noAgeSuffix
                        ) {
                            finalFileName =
                                unitName;
                        } else {
                            finalFileName =
                                filename +
                                age +
                                extension;
                        }
                    } else {
                        // 默认规则
                        finalFileName =
                            filename +
                            age +
                            extension;
                    }
                }
                // 注意这里已经改成 currentCivLink
                const newSrc =
                    `https://data.seicing.com/seicingdepot/3fatcatpool/aoe4/unit/${currentCivLink}/${finalFileName}`;
                $img.off(
                    'load error'
                );
                $img.one(
                    'load',
                    function () {
                        syncImageScales();
                        dfd.resolve();
                    }
                ).one(
                    'error',
                    function () {
                        $(this).css(
                            'visibility',
                            'hidden'
                        );
                        dfd.resolve();
                    }
                );
                $img.css(
                    'visibility',
                    'visible'
                );
                $img.attr(
                    'src',
                    newSrc
                );
            });
            $.when.apply(
                $,
                imageLoadPromises
            ).done(function () {
                applyHidingRules(age);
                syncImageScales();
            });
        }
        // =========================================================
        // 同步缩放
        // =========================================================
        function syncImageScales() {
            $table.find('img').css({
                width: '',
                'max-width': '100%'
            });
            let $refImage = null;
            $table.find('img')
                .each(function () {
                    const src =
                        $(this).attr(
                            'src'
                        ) || '';
                    if (
                        src.includes(
                            '侦察兵'
                        )
                    ) {
                        $refImage =
                            $(this);
                        return false;
                    }
                });
            if (
                !$refImage ||
                !$refImage.length
            ) return;
            const refNaturalWidth =
                $refImage[0]
                    .naturalWidth;
            if (
                refNaturalWidth <= 0
            ) return;
            const refCurrentWidth =
                $refImage[0].getBoundingClientRect().width;
            const scaleRatio =
                refCurrentWidth /
                refNaturalWidth;
            $table.find('img')
                .each(function () {
                    const $img =
                        $(this);
                    if (
                        $img.css(
                            'visibility'
                        ) === 'hidden'
                    ) return;
                    const naturalWidth =
                        this.naturalWidth;
                    if (
                        naturalWidth <= 0
                    ) return;
                    let newWidth =
                        naturalWidth *
                        scaleRatio;
                    if (
                        $img.hasClass(
                            'rakuda'
                        )
                    ) {
                        newWidth *= 0.85;
                    }
                    if (
                        $img.hasClass(
                            'elephante'
                        )
                    ) {
                        newWidth *= 1.2;
                    }
                    $img.css({
                        width:
                            newWidth + 'px',
                        'max-width':
                            'none'
                    });
                });
        }
        // =========================================================
        // resize
        // =========================================================
        $(window).on(
            'resize',
            function () {
                $table.find('img')
                    .css({
                        width: '',
                        'max-width':
                            '100%'
                    });
                setTimeout(
                    syncImageScales,
                    50
                );
            }
        );
        // =========================================================
        // 初始化
        // =========================================================
        generateTable();
        updateImageSources(currentAge);
    });


    document.addEventListener(
        'error',
        function (e) {

            const target = e.target;

            if (
                target.tagName === 'IMG' &&
                target.closest('#customers')
            ) {

                target.src =
                    'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';

            }

        },
        true
    );
</script>
