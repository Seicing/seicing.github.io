<div id="Layer1" style="display: none; position: absolute; z-index: 100;"></div>
伟业分为“重大伟业”和“次要伟业”，玩家达成“重大伟业”后，将会解锁对应的“献礼”，“献礼”等同于下个时代的开局加成，每个玩家都可以在下个时代开局时选择3个“献礼”来获得优势<br>
无论玩家是否完成任何“重大伟业”，每次时代都会免费解锁5个通用“献礼”<br>
因为“献礼”用于下个时代开局，所以近世时代(暂时？)没有任何“重大伟业”<br>
并不是所有的“重大伟业”都可以被同时使用，可通过设置来设定“重大伟业”的登场<br>
<br>
“次要伟业”是可以马上作用于当前时代的目标，完成目标后会在当前时代解锁对应的加成，持续到本时代结束、下时代开始为止<br><br>
