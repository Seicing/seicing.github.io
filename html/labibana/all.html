<script>
    fetch("https://seicing.com/js/noun.json")
        .then(response => response.json())
        .then(data => {
            const tbody = document.querySelector("#customers tbody");

            const langs = ["cn", "en", "jp", "ko", "ad"];

            data
                .filter(item =>
                    !item.hidden &&
                    langs.some(lang => (item[lang] || "").trim())
                )
                .forEach(item => {
                    const tr = document.createElement("tr");

                    langs.forEach(lang => {
                        const td = document.createElement("td");

                        const text = item[lang] || "";
                        const ruby = item[lang + "sp"];

                        if (ruby) {
                            td.innerHTML = `
                            <ruby>
                                ${text}
                                <rt>${ruby}</rt>
                            </ruby>
                        `;
                        } else {
                            td.textContent = text;
                        }

                        tr.appendChild(td);
                    });

                    tbody.appendChild(tr);
                });
        })
        .catch(err => console.error(err));
</script>
